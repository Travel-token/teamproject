server.port=8081

spring.application.name=travel-settle-admin-api

# DB 접속 정보 - 실제 계정으로 변경하세요
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/travel_token?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false
spring.datasource.username=root
spring.datasource.password=admin1234

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=200
mybatis.configuration.call-setters-on-nulls=true

# admin.html을 스프링부트가 직접 서빙하면(static 폴더) 같은 출처라 CORS가 사실상 필요 없지만,
# 다른 주소에서 열어볼 경우를 대비해 등록해둡니다.
app.cors.allowed-origins[0]=http://localhost:8081
app.cors.allowed-origins[1]=http://localhost:5500
app.cors.allowed-origins[2]=http://127.0.0.1:5500

# JWT - 운영 배포 전 반드시 랜덤 값으로 교체 (openssl rand -base64 64)
app.jwt.secret=c2VjcmV0LWtleS1mb3ItdHJhdmVsLXNldHRsZS1hZG1pbi1hcGktY2hhbmdlLXRoaXMtaW4tcHJvZHVjdGlvbi1wbGVhc2U=
app.jwt.expiration-ms=43200000

logging.level.com.example.project=debug
logging.level.org.mybatis=debug



spring.devtools.restart.enabled=false